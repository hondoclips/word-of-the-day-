<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word of the Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('starry-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: transparent;
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .date {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .pronunciation {
            color: #cbd5e1;
            font-size: 18px;
            font-style: italic;
            margin-bottom: 30px;
        }

        .part-of-speech {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .definition {
            color: #f1f5f9;
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .example {
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .example-label {
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .example-text {
            color: #e2e8f0;
            font-size: 18px;
            font-style: italic;
            line-height: 1.5;
        }

        .footer {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 20px;
        }

        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            gap: 30px;
        }

        .nav-btn {
            background: transparent;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.4;
        }

        .nav-btn:hover {
            opacity: 0.6;
        }

        .title {
            color: #ffffff;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        .read-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }

        .read-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Word of the Day</div>
        <div class="date" id="date">Monday, February 10, 2026</div>
        <h1 id="word">Serendipity</h1>
        <div class="pronunciation" id="pronunciation">/ˌser-ən-ˈdi-pə-tē/</div>
        <div class="part-of-speech" id="partOfSpeech">noun</div>
        <button class="read-btn" onclick="readWord()">🔊 Listen</button>
        <div class="definition" id="definition">
            The occurrence and development of events by chance in a happy or beneficial way.
        </div>
        <div class="example">
            <div class="example-label">Example</div>
            <div class="example-text" id="example">
                "A fortunate stroke of serendipity brought the two old friends together after 20 years."
            </div>
        </div>
        <div class="footer">
            Word of the Day
        </div>
        <div class="navigation">
            <button class="nav-btn" onclick="changeDay(-1)">← Back</button>
            <button class="nav-btn" onclick="changeDay(1)">Next →</button>
        </div>
    </div>

    <audio id="wordAudio" style="display: none;"></audio>

    <script>
        const words = [
            {
                date: '2026-02-08',
                word: 'Ephemeral',
                pronunciation: '/ə-ˈfem-ər-əl/',
                partOfSpeech: 'adjective',
                definition: 'Lasting for a very short time; fleeting.',
                example: '"The ephemeral beauty of cherry blossoms makes them all the more precious."'
            },
            {
                date: '2026-02-09',
                word: 'Resilience',
                pronunciation: '/ri-ˈzil-yən(t)s/',
                partOfSpeech: 'noun',
                definition: 'The capacity to recover quickly from difficulties; toughness.',
                example: '"Her resilience in the face of adversity inspired everyone around her."'
            },
            {
                date: '2026-02-10',
                word: 'Serendipity',
                pronunciation: '/ˌser-ən-ˈdi-pə-tē/',
                partOfSpeech: 'noun',
                definition: 'The occurrence and development of events by chance in a happy or beneficial way.',
                example: '"A fortunate stroke of serendipity brought the two old friends together after 20 years."'
            },
            {
                date: '2026-02-11',
                word: 'Eloquent',
                pronunciation: '/ˈel-ə-kwənt/',
                partOfSpeech: 'adjective',
                definition: 'Fluent or persuasive in speaking or writing.',
                example: '"The speaker gave an eloquent speech that moved the entire audience."'
            },
            {
                date: '2026-02-12',
                word: 'Luminous',
                pronunciation: '/ˈlü-mə-nəs/',
                partOfSpeech: 'adjective',
                definition: 'Full of or shedding light; bright or shining.',
                example: '"The luminous stars lit up the night sky like diamonds."'
            }
        ];

        let currentDateIndex = 0;

        function initializeToday() {
            const today = new Date();
            const todayString = today.toISOString().split('T')[0];

            currentDateIndex = words.findIndex(w => w.date === todayString);
            if (currentDateIndex === -1) {
                currentDateIndex = words.length - 1;
            }

            updateDisplay();
        }

        function changeDay(direction) {
            currentDateIndex += direction;

            if (currentDateIndex < 0) currentDateIndex = 0;
            if (currentDateIndex >= words.length) currentDateIndex = words.length - 1;

            updateDisplay();
        }

        function updateDisplay() {
            const wordData = words[currentDateIndex];
            const dateObj = new Date(wordData.date + 'T00:00:00');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('en-US', options);

            document.getElementById('date').textContent = formattedDate.toUpperCase();
            document.getElementById('word').textContent = wordData.word;
            document.getElementById('pronunciation').textContent = wordData.pronunciation;
            document.getElementById('partOfSpeech').textContent = wordData.partOfSpeech;
            document.getElementById('definition').textContent = wordData.definition;
            document.getElementById('example').textContent = wordData.example;
        }

        async function readWord() {
            const wordData = words[currentDateIndex];
            const textToRead = `Well, my child, today's word is ${wordData.word}. ${wordData.definition}. For example, ${wordData.example}`;

            const apiKey = 'sk_08d0634e3e6e8805d53da41575ad0b9df3ee0f7129f4c2ab';
            const voiceId = 'O7C8UvoTV3wPmoA1UGjT';

            console.log('Using Voice ID:', voiceId);
            alert('Using Voice ID: ' + voiceId);

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'audio/mpeg',
                        'Content-Type': 'application/json',
                        'xi-api-key': apiKey
                    },
                    body: JSON.stringify({
                        text: textToRead,
                        model_id: 'eleven_multilingual_v2',
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.85,
                            style: 0,
                            use_speaker_boost: false
                        }
                    })
                });

                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audioElement = document.getElementById('wordAudio');
                    audioElement.src = audioUrl;
                    audioElement.play();
                } else {
                    const errorText = await response.text();
                    console.error('ElevenLabs API error:', response.status, errorText);
                    alert('API Error ' + response.status + ': ' + errorText);
                }
            } catch (error) {
                console.error('Error calling ElevenLabs API:', error);
                alert('Error generating speech: ' + error.message);
            }
        }

        initializeToday();
    </script>
</body>
</html>

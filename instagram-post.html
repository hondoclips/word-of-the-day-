<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOTD Instagram Post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000000;
            font-family: 'Georgia', serif;
            padding: 20px;
        }

        .instagram-post {
            width: 1080px;
            height: 1350px;
            background: #000000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* Stars layer */
        .wood-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(1px 1px at 5% 8%, white, transparent),
                radial-gradient(1px 1px at 12% 3%, white, transparent),
                radial-gradient(2px 2px at 18% 15%, white, transparent),
                radial-gradient(1px 1px at 25% 6%, white, transparent),
                radial-gradient(1px 1px at 33% 22%, white, transparent),
                radial-gradient(2px 2px at 40% 10%, white, transparent),
                radial-gradient(1px 1px at 47% 4%, white, transparent),
                radial-gradient(1px 1px at 55% 18%, white, transparent),
                radial-gradient(2px 2px at 62% 7%, white, transparent),
                radial-gradient(1px 1px at 70% 25%, white, transparent),
                radial-gradient(1px 1px at 78% 12%, white, transparent),
                radial-gradient(2px 2px at 85% 5%, white, transparent),
                radial-gradient(1px 1px at 92% 20%, white, transparent),
                radial-gradient(1px 1px at 97% 9%, white, transparent),
                radial-gradient(1px 1px at 8% 35%, white, transparent),
                radial-gradient(2px 2px at 15% 42%, white, transparent),
                radial-gradient(1px 1px at 22% 50%, white, transparent),
                radial-gradient(1px 1px at 30% 38%, white, transparent),
                radial-gradient(1px 1px at 38% 55%, white, transparent),
                radial-gradient(2px 2px at 45% 45%, white, transparent),
                radial-gradient(1px 1px at 52% 60%, white, transparent),
                radial-gradient(1px 1px at 60% 33%, white, transparent),
                radial-gradient(2px 2px at 67% 48%, white, transparent),
                radial-gradient(1px 1px at 75% 57%, white, transparent),
                radial-gradient(1px 1px at 83% 40%, white, transparent),
                radial-gradient(1px 1px at 90% 52%, white, transparent),
                radial-gradient(2px 2px at 3% 65%, white, transparent),
                radial-gradient(1px 1px at 10% 72%, white, transparent),
                radial-gradient(1px 1px at 20% 78%, white, transparent),
                radial-gradient(1px 1px at 28% 68%, white, transparent),
                radial-gradient(2px 2px at 35% 82%, white, transparent),
                radial-gradient(1px 1px at 43% 74%, white, transparent),
                radial-gradient(1px 1px at 50% 88%, white, transparent),
                radial-gradient(2px 2px at 58% 70%, white, transparent),
                radial-gradient(1px 1px at 65% 85%, white, transparent),
                radial-gradient(1px 1px at 73% 76%, white, transparent),
                radial-gradient(1px 1px at 80% 92%, white, transparent),
                radial-gradient(2px 2px at 88% 80%, white, transparent),
                radial-gradient(1px 1px at 95% 67%, white, transparent),
                radial-gradient(1px 1px at 7% 90%, white, transparent),
                radial-gradient(1px 1px at 17% 95%, white, transparent),
                radial-gradient(2px 2px at 27% 88%, white, transparent),
                radial-gradient(1px 1px at 37% 96%, white, transparent),
                radial-gradient(1px 1px at 48% 93%, white, transparent),
                radial-gradient(1px 1px at 57% 97%, white, transparent),
                radial-gradient(2px 2px at 68% 91%, white, transparent),
                radial-gradient(1px 1px at 77% 98%, white, transparent),
                radial-gradient(1px 1px at 87% 94%, white, transparent),
                radial-gradient(1px 1px at 96% 87%, white, transparent);
            background-size: 100% 100%;
            background-repeat: no-repeat;
            opacity: 0.8;
        }

        .fireplace-glow {
            display: none;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 100px 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .wizard-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.15), 0 0 100px rgba(255, 255, 255, 0.08);
        }

        .logo {
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-style: italic;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .date {
            position: absolute;
            top: 40px;
            right: 40px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .word {
            color: rgba(255, 255, 255, 0.95);
            font-size: 90px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1;
        }

        .pronunciation {
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            font-style: italic;
            margin-bottom: 40px;
        }

        .part-of-speech {
            display: inline-block;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .definition {
            color: rgba(255, 255, 255, 0.8);
            font-size: 26px;
            line-height: 1.6;
            background: transparent;
            border-left: 3px solid rgba(255, 255, 255, 0.3);
            padding: 30px 35px;
            border-radius: 10px;
            max-width: 850px;
            margin: 0 auto 40px;
        }

        .divider {
            width: 100px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 auto 40px;
        }

        .example {
            background: transparent;
            border-left: 3px solid rgba(255, 255, 255, 0.3);
            padding: 30px 35px;
            border-radius: 10px;
            max-width: 850px;
            margin: 0 auto;
        }

        .example-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .example-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 24px;
            font-style: italic;
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
        }

        .cta {
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Decorative elements */
        .corner-accent {
            display: none;
        }
    </style>
</head>
<body>
    <div class="instagram-post">
        <div class="wood-texture"></div>
        <div class="fireplace-glow"></div>

        <div class="corner-accent top-left"></div>
        <div class="corner-accent top-right"></div>
        <div class="corner-accent bottom-left"></div>
        <div class="corner-accent bottom-right"></div>

        <div class="content">
            <div class="date">Monday, February 10</div>

            <div class="header">
                <img src="wizard.png" alt="Wizard" class="wizard-image">
                <div class="logo">Word of the Day</div>
            </div>

            <div class="main-content">

                <div class="word">Serendipity</div>

                <div class="pronunciation">ser · en · dip · ih · tee</div>

                <div class="part-of-speech">noun</div>

                <div class="definition">
                    The occurrence and development of events by chance in a happy or beneficial way.
                </div>

                <div class="divider"></div>

                <div class="example">
                    <div class="example-label">Example</div>
                    <div class="example-text">
                        "A fortunate stroke of serendipity brought the two old friends together after 20 years."
                    </div>
                </div>
            </div>

            <div class="footer">
                <div class="cta">Learn a new word every day ✨</div>
            </div>
        </div>
    </div>
</body>
</html>
